name: Timestamp

on:
  workflow_dispatch:

permissions:
  contents: write
jobs:
  ZODA:
    runs-on: ubuntu-latest

    env:
      Zone: "Asia/Kolkata"

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Create folder
        run: |
          if [ -d "textfolder" ]; then
            echo "File and Folder Exist!"
          else
            mkdir -p textfolder
            echo "This file contains zone time, date and event"> textfolder/timestamp.txt
            echo "File and Folder Created Successfully!"
          fi
          

      - name: Write timestamp and event info
        run: |
          export TZ="${Zone}"
          NOW="$(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "--------------------------------------------------------" >> textfolder/timestamp.txt
          echo "Event: ${{ github.event_name}}" >> textfolder/timestamp.txt
          echo "Repository: ${{ github.repository}}" >> textfolder/timestamp.txt
          echo "Branch: ${{ github.ref_name}}" >> textfolder/timestamp.txt
          echo "Branch: ${{ github.ref_name}}" >> textfolder/timestamp.txt
          echo "Triggered at (IST): ${NOW}" >> textfolder/timestamp.txt
          echo "--------------------------------------------------------" >> textfolder/timestamp.txt
          
      - name: Commit changes
        run: |
          git config user.name "Ankit-Kumar-Bayer"
          git config user.email "ankit.kumar9.ext@bayer.com"

          git add textfolder/timestamp.txt
          git commit -m "Update timestamp from ${{github.event_name}}" || echo "No Commit."
          git push

  check-jobs:
    runs-on: ubuntu-latest
    env:
      DAYS: "7"                    # default; can be overridden via dispatch input
      FAIL_CONCLUSIONS: "failure"  # comma-separated set for FAILED
      PASS_CONCLUSIONS: "success"  # comma-separated set for PASSED
      RUN_STATUSES: "queued,in_progress"  # which job statuses count as RUNNING
    steps:
      - name: Override DAYS from workflow_dispatch
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.days != '' }}
        run: echo "DAYS=${{ github.event.inputs.days }}" >> "$GITHUB_ENV"

      - name: Ensure jq is present
        run: |
          set -e
          if ! command -v jq >/dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi

      - name: Compute failed / passed / running jobs
        id: compute
        env:
          API_URL: ${{ github.api_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PER_PAGE: "100"
          STATUS_FILTER: ""   # leave blank so we also see queued/in_progress runs if needed
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          START_ISO="$(date -u -d "${DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)"

          echo "Repository: $OWNER/$REPO"
          echo "Window start (UTC): $START_ISO"
          echo "FAILED conclusions: $FAIL_CONCLUSIONS"
          echo "PASSED conclusions: $PASS_CONCLUSIONS"
          echo "RUNNING statuses:   $RUN_STATUSES"

          gh_api() {
            local url="$1"
            local body status
            body="$(curl -sS -w "\n%{http_code}" -D >(cat >&2) \
                    -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "$url")" || { echo "::error::curl failed for $url"; exit 1; }
            status="${body##*$'\n'}"
            body="${body%$'\n'"$status"}"
            if [[ "$status" != 2* ]]; then
              echo "::error::GitHub API ${status} for ${url}"
              if echo "$body" | jq -e . >/dev/null 2>&1; then
                echo "$body" | jq . >&2 || true
              else
                echo "$body" >&2
              fi
              exit 1
            fi
            printf "%s" "$body"
          }

          base_runs_url="${API_URL}/repos/${OWNER}/${REPO}/actions/runs?created=>=${START_ISO}&per_page=${PER_PAGE}"
          # If you want only completed runs, uncomment the next line:
          # base_runs_url="${base_runs_url}&status=completed"

          # Counters
          failed_total=0
          passed_total=0
          running_total=0
          runs_processed=0

          # Build jq filters from CSV env
          IFS=',' read -r -a fail_arr <<<"$FAIL_CONCLUSIONS"
          FAIL_FILTER=$(printf '(%s)' "$(printf ' . == "%s" or' "${fail_arr[@]}" | sed 's/ or$//')")

          IFS=',' read -r -a pass_arr <<<"$PASS_CONCLUSIONS"
          PASS_FILTER=$(printf '(%s)' "$(printf ' . == "%s" or' "${pass_arr[@]}" | sed 's/ or$//')")

          IFS=',' read -r -a run_arr <<<"$RUN_STATUSES"
          RUN_FILTER=$(printf '(%s)' "$(printf ' . == "%s" or' "${run_arr[@]}" | sed 's/ or$//')")

          page=1
          while :; do
            runs_url="${base_runs_url}&page=${page}"
            runs_resp="$(gh_api "$runs_url")"

            if ! echo "$runs_resp" | jq -e '.workflow_runs' >/dev/null 2>&1; then
              echo "::warning::Unexpected runs response on page $page; stopping."
              break
            fi

            mapfile -t run_ids < <(echo "$runs_resp" | jq -r '.workflow_runs[]?.id // empty')
            [[ ${#run_ids[@]} -eq 0 ]] && break

            for run_id in "${run_ids[@]}"; do
              runs_processed=$((runs_processed+1))
              jpage=1
              while :; do
                jobs_url="${API_URL}/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs?per_page=${PER_PAGE}&page=${jpage}"
                jobs_resp="$(gh_api "$jobs_url")"

                if ! echo "$jobs_resp" | jq -e '.jobs' >/dev/null 2>&1; then
                  echo "::warning::Unexpected jobs response for run ${run_id}, page ${jpage}; break."
                  break
                fi

                job_len="$(echo "$jobs_resp" | jq '.jobs | length')"
                [[ "$job_len" -eq 0 ]] && break

                # FAILED: conclusion ∈ FAIL_CONCLUSIONS
                failed_page="$(echo "$jobs_resp" \
                  | jq "[.jobs[] | select(.conclusion != null) | .conclusion | select(${FAIL_FILTER})] | length")"
                failed_total=$((failed_total + failed_page))

                # PASSED: conclusion ∈ PASS_CONCLUSIONS
                passed_page="$(echo "$jobs_resp" \
                  | jq "[.jobs[] | select(.conclusion != null) | .conclusion | select(${PASS_FILTER})] | length")"
                passed_total=$((passed_total + passed_page))

                # RUNNING: status ∈ RUN_STATUSES (queued or in_progress)
                running_page="$(echo "$jobs_resp" \
                  | jq "[.jobs[] | select(.status != null) | .status | select(${RUN_FILTER})] | length")"
                running_total=$((running_total + running_page))

                jpage=$((jpage+1))
              done
            done

            page=$((page+1))
          done

          # Export for summary step
          {
            echo "FAILED_JOBS=${failed_total}"
            echo "PASSED_JOBS=${passed_total}"
            echo "RUNNING_JOBS=${running_total}"
            echo "RUNS_PROCESSED=${runs_processed}"
          } | tee -a "$GITHUB_ENV"

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Jobs health in the last ${DAYS} days"
            echo
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Workflow runs processed: ${RUNS_PROCESSED}"
            echo
            echo "| Metric  | Count |"
            echo "|---------|------:|"
            echo "| Failed  | ${FAILED_JOBS} |"
            echo "| Passed  | ${PASSED_JOBS} |"
            echo "| Running | ${RUNNING_JOBS} |"
            echo
            echo "- Time window start (UTC): $(date -u -d "${DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_STEP_SUMMARY"

          
  
