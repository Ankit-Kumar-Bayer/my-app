name: Simple Weekly Pass/Fail Count

on:
  workflow_dispatch:

jobs:
  count:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Count pass/fail jobs (last 7 days)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          DAYS=7
          API="https://api.github.com"
          CUTOFF=$(date -u -d "$DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)

          pass=0
          fail=0

          page=1
          while :; do
            runs=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "$API/repos/$REPO/actions/runs?per_page=100&page=$page&status=completed")

            count=$(echo "$runs" | jq '.workflow_runs | length')
            [ "$count" -eq 0 ] && break

            echo "$runs" | jq -c '.workflow_runs[]' | while read r; do
              created=$(echo "$r" | jq -r '.created_at')
              run_id=$(echo "$r" | jq -r '.id')

              # Stop if older than cutoff
              if [[ "$created" < "$CUTOFF" ]]; then
                exit 0
              fi

              jobs=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                "$API/repos/$REPO/actions/runs/$run_id/jobs?per_page=100")

              p=$(echo "$jobs" | jq '[.jobs[].conclusion] | map(select(.=="success")) | length')
              f=$(echo "$jobs" | jq '[.jobs[].conclusion] | map(select(.=="failure")) | length')

              pass=$((pass + p))
              fail=$((fail + f))
            done || break

            page=$((page+1))
          done

          echo "---------------------------------"
          echo "Pass jobs in last 7 days : $pass"
          echo "Fail jobs in last 7 days : $fail"
          echo "---------------------------------"
