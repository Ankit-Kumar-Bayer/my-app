name: Count failed jobs (last 7 days)

on:
  workflow_dispatch:
  schedule:
    # Every Monday 00:15 UTC (adjust as you like)
    - cron: "15 0 * * 1"

permissions:
  contents: read
  actions: read

jobs:
  count-failed-jobs:
    runs-on: ubuntu-latest
    env:
      DAYS: "7"
      # Comma-separated list of job conclusions to count as "failed".
      # Default is only "failure". You can extend to include "timed_out" etc.
      FAIL_CONCLUSIONS: "failure"
    steps:
      - name: Ensure jq is available
        run: |
          set -e
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi

      - name: Count failed jobs in the last ${{ env.DAYS }} days
        id: count
        env:
          API_URL: ${{ github.api_url }}   # Works for GHES and github.com
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          # ^ Split "owner/repo" into parts via Bash parameter expansion. [6](https://www.cazzulino.com/github-actions-repository.html)

          TOKEN="${GITHUB_TOKEN}"
          PER_PAGE=100
          # Use date-only value for 'created' filter (supported by the API)
          START_DATE="$(date -u -d "${DAYS} days ago" +%Y-%m-%d)"

          echo "Repository: $OWNER/$REPO"
          echo "Window start (UTC): $START_DATE"
          echo "Counting these conclusions as failures: ${FAIL_CONCLUSIONS}"

          failed_total=0
          runs_processed=0
          page=1

          while :; do
            # List workflow runs created since START_DATE, limited to completed ones.
            # API docs: List workflow runs + 'created' filter supported. [3](https://docs.github.com/en/rest/actions/workflow-runs)[4](https://github.blog/changelog/2021-09-02-github-actions-filter-workflow-runs-by-created-date/)
            runs_resp="$(curl -fsSL \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_URL}/repos/${OWNER}/${REPO}/actions/runs?status=completed&created=>=${START_DATE}&per_page=${PER_PAGE}&page=${page}")"

            run_ids="$(jq -r '.workflow_runs[]?.id' <<<"$runs_resp")"
            [[ -z "${run_ids}" ]] && break

            for run_id in $run_ids; do
              runs_processed=$((runs_processed+1))
              jpage=1
              while :; do
                # List jobs for a workflow run (paginated). [5](https://docs.github.com/en/rest/actions/workflow-jobs)
                jobs_resp="$(curl -fsSL \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${API_URL}/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs?per_page=${PER_PAGE}&page=${jpage}")"

                job_count="$(jq '.jobs | length' <<<"$jobs_resp")"
                [[ "${job_count}" -eq 0 ]] && break

                # Build jq predicate from FAIL_CONCLUSIONS (e.g., "failure,timed_out")
                IFS=',' read -r -a concl <<<"${FAIL_CONCLUSIONS}"
                jq_filter=$(printf '(%s)' "$(printf ' . == "%s" or' "${concl[@]}" | sed 's/ or$//')")

                failures="$(jq "[.jobs[] | select(.conclusion != null) | .conclusion | select(${jq_filter})] | length" <<<"$jobs_resp")"
                failed_total=$((failed_total + failures))

                jpage=$((jpage+1))
              done
            done

            page=$((page+1))
          done

          echo "FAILED_JOBS=${failed_total}" | tee -a "$GITHUB_ENV"
          echo "RUNS_PROCESSED=${runs_processed}" | tee -a "$GITHUB_ENV"

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Failed jobs in the last ${DAYS} days"
            echo
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Workflow runs processed: ${RUNS_PROCESSED}"
            echo "- Failed jobs counted (conclusions = ${FAIL_CONCLUSIONS}): **${FAILED_JOBS}**"
            echo "- Time window start (UTC): $(date -u -d "${DAYS} days ago" +%Y-%m-%d)"
          } >> "$GITHUB_STEP_SUMMARY"
          # Writes markdown to the run summary. [1](https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands)[2](https://github.blog/news-insights/product-news/supercharging-github-actions-with-job-summaries/)
